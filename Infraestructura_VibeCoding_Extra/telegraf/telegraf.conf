# telegraf.conf
# -----------------------------------------------------------------------------
# Puente MQTT -> InfluxDB v2. Telegraf se suscribe a los topicos de la alarma y
# guarda las metricas en el bucket 'sensores_db' de InfluxDB para graficar series
# de tiempo (por ejemplo, la magnitud de aceleracion).
#
# Se usa InfluxDB 2.7 (no la 3-core del borrador) porque su inicializacion via
# variables de entorno es 100% automatica y reproducible: el token de admin se
# fija por env y este archivo lo reutiliza. Asi el stack levanta sin pasos manuales.
# -----------------------------------------------------------------------------

[agent]
  interval = "2s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  flush_interval = "2s"
  flush_jitter = "0s"
  precision = "1ms"
  omit_hostname = true

# -- SALIDA A INFLUXDB v2 --
[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "$INFLUX_TOKEN"
  organization = "$INFLUX_ORG"
  bucket = "$INFLUX_BUCKET"

# -- ENTRADA DESDE MOSQUITTO --
[[inputs.mqtt_consumer]]
  servers = ["tcp://mosquitto:1883"]
  topics = [
    "alarma/estado",
    "alarma/comando",
    "alarma/acel",
    "alarma/evento"
  ]
  username = "$MQTT_USER"
  password = "$MQTT_PASS"
  data_format = "json"
  # Campos de texto (el resto de claves numericas se guardan como floats)
  json_string_fields = ["estado", "modo", "evento", "detalle", "cmd"]
  # El topico queda como tag para poder filtrar en InfluxDB
  topic_tag = "topic"
  name_override = "datos_sensores"
