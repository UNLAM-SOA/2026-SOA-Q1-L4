; -----------------------------------------------------------------------------
; platformio.ini - Dispositivo IoT Antirrobos (ESP32-C3)
;
; Dos entornos:
;   [env:esp32-c3]  -> compila el firmware para el ESP32-C3 (Wokwi y placa real).
;   [env:native]    -> compila y ejecuta los tests de la FSM en la PC.
;
; Se fija la version del plataforma 'espressif32' a 6.9.0 (arduino-esp32 2.0.17)
; porque es una version estable y ampliamente probada, y porque las llamadas a
; la API LEDC del buzzer (ledcSetup/ledcAttachPin/ledcWriteTone) corresponden a
; ese core. Asi se evita el clasico error de "funcion no declarada" que aparece
; al mezclar la API del core 3.x.
; -----------------------------------------------------------------------------

[platformio]
default_envs = esp32-c3

[env:esp32-c3]
platform = espressif32@6.9.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.1.0
    adafruit/Adafruit MPU6050@^2.2.6
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/Adafruit BusIO@^1.16.1
build_flags =
    -DCORE_DEBUG_LEVEL=1

; Entorno nativo (PC) para correr los tests unitarios de la maquina de estados.
; Se excluye main.cpp porque depende de Arduino/FreeRTOS y no compila en la PC.
[env:native]
platform = native
test_framework = unity
build_src_filter = +<*> -<main.cpp>
build_flags = -std=c++17
